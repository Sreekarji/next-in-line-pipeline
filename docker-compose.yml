
services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: xcrowd_user
      POSTGRES_PASSWORD: xcrowd_password
      POSTGRES_DB: xcrowd_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xcrowd_user -d xcrowd_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: npm run dev # Running dev for local testing execution
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://xcrowd_user:xcrowd_password@postgres:5432/xcrowd_pipeline
      - PORT=3000
      - DECAY_INTERVAL_MS=30000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
